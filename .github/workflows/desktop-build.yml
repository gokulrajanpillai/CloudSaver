name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  pyinstaller:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,release]"

      - name: Build one-file app
        run: |
          pyinstaller --name CloudSaver --onefile --add-data "web:web" cloudsaver/web_server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudSaver-${{ matrix.os }}
          path: |
            dist/CloudSaver*
