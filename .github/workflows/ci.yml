name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"

    - name: Compile Python modules
      run: |
        python -m py_compile cloudsaver/core.py cloudsaver/web_server.py cloudsaver/history.py cloudsaver/desktop.py

    - name: Run tests
      run: |
        python -m pytest

  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm

    - name: Install frontend dependencies
      run: npm ci

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Check JavaScript syntax
      run: npm run check:js

    - name: Run browser integration tests
      run: npm run test:e2e

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts
        path: |
          playwright-report/
          test-results/
        if-no-files-found: ignore

  startup-smoke:
    name: Startup smoke
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .

    - name: Start local web UI
      run: |
        CLOUDSAVER_PORT=8765 ./scripts/start-cloudsaver.sh > cloudsaver.log 2>&1 &
        echo $! > cloudsaver.pid
        for i in {1..20}; do
          if curl -fsS http://127.0.0.1:8765/api/health; then
            exit 0
          fi
          sleep 0.5
        done
        cat cloudsaver.log
        exit 1

    - name: Verify app shell
      run: |
        curl -fsS http://127.0.0.1:8765/ | grep -q "CloudSaver"

    - name: Stop local web UI
      if: always()
      run: |
        if [ -f cloudsaver.pid ]; then
          kill "$(cat cloudsaver.pid)" || true
        fi

  package-build:
    name: Package build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Build package
      run: |
        python -m pip install --upgrade pip build
        python -m build
